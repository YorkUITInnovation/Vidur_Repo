name: Copilot Prompt Coach

# Fires when the 'copilot' label is added to an issue
on:
  issues:
    types: [labeled]

jobs:
  refine-prompt:
    if: github.event.label.name == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      issues: write        # needed to post the comment back

    steps:
      - name: Refine issue into a comprehensive Copilot prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_KEY: ${{ secrets.AZURE_AI_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request
          import urllib.error

          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title  = os.environ["ISSUE_TITLE"]
          issue_body   = os.environ.get("ISSUE_BODY", "(no description provided)")
          repo_owner   = os.environ["REPO_OWNER"]
          repo_name    = os.environ["REPO_NAME"]
          endpoint     = os.environ["AZURE_AI_ENDPOINT"]
          api_key      = os.environ["AZURE_AI_KEY"]
          github_token = os.environ["GITHUB_TOKEN"]

          # -------------------------------------------------------------------
          # Codebase context — update this block whenever the site changes
          # -------------------------------------------------------------------
          codebase_context = """
          ## Codebase: York University IT Innovation Team Website

          ### What this repo is
          A static marketing/informational website for the York University IT Innovation Team.
          No build tools, no frameworks, no package managers — vanilla HTML, CSS, and JS only.

          ### Tech stack
          - Pure HTML5 (index.html — single page, all sections in one file)
          - Vanilla CSS (css/styles.css — all styles, no preprocessor)
          - Vanilla JavaScript (js/main.js — all interactivity)
          - Font Awesome 6.5 loaded via CDN for icons
          - No npm, no bundler, no transpiler — what you see is what the browser runs

          ### File structure
          - index.html       — Single-page site, all sections
          - css/styles.css   — All styles (layout, components, animations, responsive)
          - js/main.js       — All interactivity (nav, scroll, counters, filter, form)

          ### Page sections (in order in index.html)
          1. Header / Navbar — responsive hamburger menu (nav-toggle, nav-menu)
          2. Hero — headline, CTA buttons, animated icon grid (hero-shape elements)
          3. Stats Banner — animated counters (data-target drives count-up animation)
          4. About — mission/vision cards with .reveal scroll animation
          5. Services — 6-card grid with .reveal scroll animation
          6. Projects — filterable grid (data-category, filter buttons with data-filter)
          7. Team — cards with avatar icons and social links
          8. Contact — form (#contact-form) with client-side validation and #form-success
          9. Footer — links, social icons, dynamic copyright year (#footer-year)

          ### JavaScript behaviour (js/main.js)
          - Nav toggle: hamburger button toggles nav-menu--open class on #nav-menu
          - Scroll reveal: IntersectionObserver adds 'revealed' class to .reveal elements
          - Stats counter: counts up from 0 to data-target value when stat enters viewport
          - Project filter: .filter-btn filters .project-card by data-category (toggles 'hidden')
          - Contact form: validates name, email (format), message; shows .form-error spans;
            shows #form-success on valid submit

          ### CSS conventions
          - BEM-style class naming: .block, .block__element, .block--modifier
          - CSS custom properties on :root for colours, spacing, typography
          - Mobile-first responsive — base styles for mobile, @media (min-width: ...) for larger
          - York brand colours: primary red #8B1538, white #FFFFFF, dark #1a1a2e

          ### Hard constraints — always follow
          - No external JS libraries — keep it vanilla, no jQuery, no frameworks
          - No build step — all files must work by opening index.html directly in a browser
          - No npm, no node_modules, no package.json
          """

          # -------------------------------------------------------------------
          # System prompt for Claude
          # -------------------------------------------------------------------
          system_prompt = (
              "You are a senior front-end developer and technical analyst. "
              "Your job is to take a vague GitHub issue and rewrite it as a comprehensive, "
              "actionable prompt for an AI coding agent (GitHub Copilot) to implement independently.\n\n"
              "The refined prompt must include:\n"
              "1. A clear problem statement\n"
              "2. The specific files likely involved (index.html, css/styles.css, js/main.js)\n"
              "3. Acceptance criteria — what 'done' looks like, testable and concrete\n"
              "4. Any edge cases or gotchas the coding agent should watch out for\n"
              "5. Constraints to follow (no build tools, no external libraries, vanilla only)\n\n"
              "Be specific. Reference actual class names, IDs, and file paths from the codebase context. "
              "Do not add features beyond what was requested. Output only the refined prompt, no preamble."
          )

          user_message = (
              f"Codebase context:\n{codebase_context}\n\n"
              f"---\n\n"
              f"Original issue title: {issue_title}\n\n"
              f"Original issue description:\n{issue_body}\n\n"
              f"---\n\n"
              f"Write the refined Copilot prompt now:"
          )

          # -------------------------------------------------------------------
          # Call Claude via Azure AI Foundry (Anthropic-native endpoint)
          # Auth uses 'api-key' header, body uses Anthropic's native format.
          # -------------------------------------------------------------------
          payload = {
              "model": "aura-claude-sonnet-4-6-useast2",
              "max_tokens": 1500,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_message}],
          }

          req = urllib.request.Request(
              endpoint,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print(f"Azure AI Foundry error {e.code}: {e.read().decode('utf-8')}")
              raise SystemExit(1)

          refined_prompt = data["content"][0]["text"]

          # -------------------------------------------------------------------
          # Post the refined prompt as a comment on the issue
          # -------------------------------------------------------------------
          comment_body = (
              "## \U0001f916 Copilot Prompt Coach\n\n"
              "The following is a refined version of this issue, structured to give "
              "GitHub Copilot all the context it needs to implement a solution.\n\n"
              "> If anything looks wrong or incomplete, edit the issue description "
              "before Copilot starts working.\n\n"
              "---\n\n"
              + refined_prompt
              + "\n\n---\n"
              "*Generated automatically when the `copilot` label was applied.*"
          )

          github_url = (
              f"https://api.github.com/repos/{repo_owner}/{repo_name}"
              f"/issues/{issue_number}/comments"
          )
          comment_req = urllib.request.Request(
              github_url,
              data=json.dumps({"body": comment_body}).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {github_token}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
                  "User-Agent": "prompt-coach-action",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(comment_req) as resp:
                  print(f"Comment posted — HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"GitHub API error {e.code}: {e.read().decode('utf-8')}")
              raise SystemExit(1)

          PYEOF
